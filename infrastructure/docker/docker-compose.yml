version: '3.8'

services:
  # ============================================================================
  # DATABASE
  # ============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: live_volley_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-livevolley}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-live_volley}
    ports:
      - ${DB_PORT:-5432}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-livevolley}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - live_volley_net

  # ============================================================================
  # CACHE
  # ============================================================================

  redis:
    image: redis:7-alpine
    container_name: live_volley_redis
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - live_volley_net

  # ============================================================================
  # BACKEND API
  # ============================================================================

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: api
    container_name: live_volley_api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-livevolley}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-live_volley}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CLIENT_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3002
    ports:
      - ${API_PORT:-3001}:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - live_volley_net
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

  # ============================================================================
  # FRONTEND
  # ============================================================================

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: web
    container_name: live_volley_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
      NEXT_PUBLIC_STREAMING_URL: http://localhost:8080
    ports:
      - ${WEB_PORT:-3000}:3000
    depends_on:
      - api
    networks:
      - live_volley_net

  # ============================================================================
  # STREAMING (Optional - RTMP/HLS)
  # ============================================================================

  nginx-rtmp:
    image: tiangolo/nginx-rtmp:latest
    container_name: live_volley_streaming
    ports:
      - ${RTMP_PORT:-1935}:1935
      - ${HLS_PORT:-8080}:80
    volumes:
      - ./infrastructure/docker/nginx-rtmp.conf:/etc/nginx/nginx.conf
      - streaming_data:/tmp/hls
    networks:
      - live_volley_net

  # ============================================================================
  # PGADMIN (Optional - Database Management)
  # ============================================================================

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: live_volley_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - ${PGADMIN_PORT:-5050}:80
    depends_on:
      - postgres
    networks:
      - live_volley_net

volumes:
  postgres_data:
  redis_data:
  streaming_data:

networks:
  live_volley_net:
    driver: bridge
